precision = "bf16"
unit = "epoch"
clip_gradients = 1.0
seed = 42

[data]
train_shards = "./imagenet/imagenet1k-train-*.tar"
valid_shards = "./imagenet/imagenet1k-validation-*.tar"
batch_size = 512
max_seq_len = 200_000
threads = 16
resolution_cap = 224

[augmentation]
recipe = "randaug"
magnitude = 0.5
with_flip = true

[model]
size = "s"
patch_method = "resize"
with_ape = true
drop_path = 0.05
mlp_ratio = 4.0
activation = "gelu"
layerscale = 1e-4

[model.head]
task = "classification"
method = "avgpool"
loss = "bce"
classes = 1000
smooth = 0.0

[optimizer]
algorithm = "muon"
learning_rate = 5e-4
weight_decay = 1e-4
momentum = 0.95
nesterov = true

[scheduler]
total = 90
warmup = 5

[ema]
enabled = true
decay = 0.9999

[validation]
frequency = 10
batch_size = 512
resolution_cap = 224

[checkpoint]
frequency = 10
directory = "./runs/checkpoints"

[logging]
frequency = 1
directory = "./runs/logs"
project = "imagenet-vit"
group = "s16-90ep"
