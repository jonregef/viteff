precision = "bf16"
unit = "epoch"
clip_gradients = 1.0

[data]
train_shards = "./imagenet/imagenet1k-train-*.tar"
valid_shards = "./imagenet/imagenet1k-validation-*.tar"
batch_size = 512
max_seq_len = 2_000_000
threads = 16

[model]
size = "s"
sparse = false
patch_method = "resize"
with_ape = true
proj_drop = 0.05
registers = 5

[model.head]
task = "classification"
method = "register"
loss = "bce"
classes = 1000

[optimizer]
learning_rate = 0.005
weight_decay = 0.05
momentum = 0.9
nesterov = true
algorithm = "muon"

[scheduler]
total = 300
warmup = 5

[logging]
frequency = 1
directory = "./runs/logs"

[checkpoint]
frequency = 10
directory = "./runs/checkpoints"

[validation]
frequency = 10
batch_size = 256

[ema]
enabled = true
decay = 0.9999
